server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /predict {
        proxy_pass http://apartment-price-backend:8000/predict;
    }

    location /model {
        proxy_pass http://apartment-price-backend:8000/model;
    }

    location /schema {
        proxy_pass http://apartment-price-backend:8000/schema;
    }

    location /health {
        proxy_pass http://apartment-price-backend:8000/health;
    }

    location /events/prediction {
    proxy_pass http://apartment-price-backend:8000/events/prediction;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}
}