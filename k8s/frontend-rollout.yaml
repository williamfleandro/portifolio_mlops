apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: apartment-price-frontend
  namespace: mlops-demo
spec:
  replicas: 2
  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: apartment-price-frontend

  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause:
            duration: 30s
        - setWeight: 100

  template:
    metadata:
      labels:
        app: apartment-price-frontend
    spec:
      containers:
        - name: frontend
          image: apartment-price-frontend:1.7
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: apartment-price-frontend
  namespace: mlops-demo
spec:
  type: NodePort
  selector:
    app: apartment-price-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
